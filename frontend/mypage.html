<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch - 마이페이지</title>
    <style>
        body { margin: 0; background-color: #141414; color: white; font-family: 'Pretendard', sans-serif; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background: rgba(0,0,0,0.8); }
        header h1 { color: #e50914; margin: 0; font-size: 32px; cursor: pointer; }
        
        .nav-btns button { background: transparent; color: white; border: 1px solid white; padding: 8px 16px; border-radius: 4px; cursor: pointer; transition: 0.3s; margin-left: 10px; }
        .nav-btns button:hover { background: white; color: black; }

        .container { padding: 50px; }
        .container h2 { font-size: 28px; margin-bottom: 30px; border-left: 4px solid #e50914; padding-left: 15px; }

        /* 가로 스크롤바 디자인 추가 */
        .movie-row::-webkit-scrollbar { height: 8px; }
        .movie-row::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }

        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        
        .movie-card { background-color: #222; border-radius: 8px; overflow: hidden; transition: transform 0.2s; cursor: pointer; }
        .movie-card:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.8); }
        .movie-poster { width: 100%; height: 300px; object-fit: cover; }
        .movie-info { padding: 15px; }
        .movie-title { margin: 0 0 10px 0; font-weight: bold; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .movie-rating { margin: 0; color: #ffd700; font-size: 14px; }
        
        .empty-message { text-align: center; color: #888; font-size: 18px; margin-top: 100px; }

        /* 모달 스타일 코드 이식 */
        @keyframes zoomIn { from { transform: scale(0.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #181818; width: 80vw; height: 80vh; border-radius: 12px; overflow-y: auto; position: relative; animation: zoomIn 0.3s ease-out; box-shadow: 0 0 50px rgba(0,0,0,1); }
        .modal-banner { width: 100%; height: 50%; overflow: hidden; position: relative; background-color: #000; }
        .modal-banner img { width: 100%; height: 100%; object-fit: contain; }
        .modal-body { padding: 40px; }
        .modal-title { font-size: 40px; margin: 0 0 20px 0; font-weight: bold; }
        .modal-overview { font-size: 18px; line-height: 1.8; color: #d2d2d2; max-width: 800px; }
        .modal-btns { margin-top: 30px; display: flex; gap: 15px; }
        #likeBtn { padding: 15px 35px; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .close-btn { padding: 15px 35px; background: #333; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 18px; }
        .age-badge { position: absolute; top: 20px; right: 20px; color: white; font-weight: bold; padding: 8px 12px; border-radius: 5px; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); z-index: 10; }
    </style>
</head>
<body>

    <header>
        <h1 onclick="location.href='index.html'">CineMatch</h1>
        <div class="nav-btns">
            <button onclick="location.href='index.html'">홈으로 가기</button>
        </div>
    </header>

    <div class="container">
        <h2>✨ 나만을 위한 맞춤 추천 <span id="genreSubtitle" style="font-size: 16px; color: #aaa; margin-left: 10px; font-weight: normal;"></span></h2>
        <div class="movie-row" id="personalRecRow" style="margin-bottom: 50px; display: flex; overflow-x: auto; gap: 15px; padding-bottom: 15px;">
            <p style="color: gray;">취향을 분석하는 중입니다...</p>
        </div>

        <h2>♥ 내가 찜한 영화</h2>
        <div class="movie-grid" id="likedMoviesGrid">
            <p style="color: gray;">찜한 영화 목록을 불러오는 중입니다...</p>
        </div>
    </div>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <div class="modal-banner">
                <img id="modalPoster" src="" alt="포스터">
                <div id="modalAgeRating" class="age-badge" style="display: none;"></div>
            </div>
            <div class="modal-body">
                <h2 id="modalTitle"></h2>
                <p id="modalOverview"></p>
                <div id="modalDetails" style="margin-bottom: 20px; color: #aaa;">
                    <p id="modalRating"></p>
                    <p id="modalDirector"></p>
                    <p id="modalCast"></p>
                    <p id="modalRelease"></p>
                    <p id="modalGenres"></p>
                </div>
                <div id="mediaSection" style="margin-top: 30px;">
                    <h3>예고편</h3>
                    <div id="trailerContainer" style="margin-bottom: 20px;"></div>
                    <div id="reviewSection">
                        <h3>사용자 리뷰</h3>
                        <ul id="reviewList" style="list-style: none; padding: 0;"></ul>
                    </div>
                </div>
                <div id="recommendationSection" style="margin-top: 30px; border-top: 1px solid #333; padding-top: 20px;">
                    <h3>이런 영화는 어떠세요?</h3>
                    <div id="recommendList" style="display: flex; gap: 15px; flex-wrap: wrap;"></div>
                </div>
                <div class="modal-btns" style="margin-top: 30px;">
                    <button id="likeBtn">찜하기 ♥</button>
                    <button class="close-btn" onclick="document.getElementById('movieModal').style.display='none'">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const userEmail = "test1@naver.com";
        const movieMap = new Map(); 
        let likedMovieIds = new Set(); // 찜한 영화 ID 저장 전용 Set

        // 찜 목록 상태 실시간 조회를 위한 동기화 함수
        async function syncLikedStatus() {
            try {
                const res = await fetch(`http://127.0.0.1:8000/api/movies/liked-ids/${userEmail}`);
                const ids = await res.json();
                likedMovieIds = new Set(ids);
            } catch (e) { console.error(e); }
        }

        // ✨ 유저 맞춤 AI 추천 영화 불러오기 (장르 텍스트 처리 추가)
        async function fetchPersonalRecommendations() {
            const row = document.getElementById('personalRecRow');
            const subtitle = document.getElementById('genreSubtitle'); // 부제목 요소 가져오기
            try {
                const response = await fetch(`http://127.0.0.1:8000/api/movies/recommendations/personal/${userEmail}`);
                const data = await response.json(); // 배열이 아닌 딕셔너리(객체)로 받음
                const movies = data.movies; // 영화 목록 추출

                row.innerHTML = ''; 

                // 데이터가 없을 때 처리
                if (!movies || movies.length === 0) {
                    row.innerHTML = '<p style="color: #888;">아직 분석할 데이터가 부족해요. 영화를 더 찜해주세요!</p>';
                    if (subtitle) subtitle.innerText = '';
                    return;
                }

                // ✨ 백엔드에서 받은 장르 텍스트를 UI에 표시
                if (data.genre) {
                    subtitle.innerText = `🍿 최근 찜한 [${data.genre}] 장르 기반`;
                }

                movies.forEach(movie => {
                    movieMap.set(movie.id, movie); // 상세정보를 위해 Map에 저장
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.dataset.id = movie.id; 
                    card.style.flex = '0 0 auto'; // 가로 스크롤 카드 고정 크기
                    card.style.width = '200px';
                    card.innerHTML = `
                        <img src="${movie.poster_url}" class="movie-poster" alt="${movie.title}">
                        <div class="movie-info">
                            <p class="movie-title">${movie.title}</p>
                            <p class="movie-rating">⭐ ${movie.rating.toFixed(1)}</p>
                        </div>
                    `;
                    row.appendChild(card);
                });

                // 클릭 이벤트 위임
                row.onclick = (e) => {
                    const card = e.target.closest('.movie-card');
                    if (card) {
                        const movieId = parseInt(card.dataset.id);
                        showMovieDetails(movieMap.get(movieId));
                    }
                };

            } catch (error) {
                console.error(error);
                row.innerHTML = '<p style="color:red;">추천 영화를 불러오지 못했습니다.</p>';
            }
        }

        async function fetchLikedMovies() {
            await syncLikedStatus();
            const grid = document.getElementById('likedMoviesGrid');
            try {
                const response = await fetch(`http://127.0.0.1:8000/api/movies/mypage/likes/${userEmail}`);
                const movies = await response.json();

                grid.innerHTML = ''; 

                if (movies.length === 0) {
                    grid.innerHTML = '<div class="empty-message">아직 찜한 영화가 없습니다. 홈에서 영화를 찜해보세요!</div>';
                    return;
                }

                movies.forEach(movie => {
                    movieMap.set(movie.id, movie);
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.dataset.id = movie.id;
                    card.innerHTML = `
                        <img src="${movie.poster_url}" class="movie-poster" alt="${movie.title}">
                        <div class="movie-info">
                            <p class="movie-title">${movie.title}</p>
                            <p class="movie-rating">⭐ ${movie.rating.toFixed(1)}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                // 클릭 이벤트 바인딩 (이벤트 위임)
                grid.onclick = (e) => {
                    const card = e.target.closest('.movie-card');
                    if (card) {
                        const movieId = parseInt(card.dataset.id);
                        showMovieDetails(movieMap.get(movieId));
                    }
                };

            } catch (error) {
                console.error('데이터 로드 실패:', error);
                grid.innerHTML = '<p style="color:red;">목록을 불러오지 못했습니다.</p>';
            }
        }

        async function showMovieDetails(movie) {
            try {
                const res = await fetch(`http://127.0.0.1:8000/api/movies/details/${movie.id}`);
                const details = await res.json();

                document.getElementById('modalPoster').src = movie.poster_url;
                document.getElementById('modalTitle').innerText = details.title;
                document.getElementById('modalOverview').innerText = `줄거리 : ${details.overview}`;
                document.getElementById('modalDirector').innerText = `감독: ${details.director}`;
                document.getElementById('modalCast').innerText = `출연: ${details.cast}`;
                document.getElementById('modalRelease').innerText = `개봉일: ${details.release_date}`;
                document.getElementById('modalGenres').innerText = `장르: ${details.genres.join(", ")}`;
                
                const ageBadge = document.getElementById('modalAgeRating');
                if (details.age_rating && details.age_rating !== "등급 미정") {
                    ageBadge.innerText = details.age_rating;
                    ageBadge.style.display = 'block';
                    ageBadge.style.backgroundColor = details.age_rating === '청소년관람불가' ? '#e50914' : 'rgba(51, 51, 51, 0.9)';
                } else { ageBadge.style.display = 'none'; }

                const recommendList = document.getElementById('recommendList');
                recommendList.innerHTML = '';
                details.recommendations.forEach(rec => {
                    const item = document.createElement('div');
                    item.style.textAlign = 'center';
                    item.style.width = '100px';
                    item.innerHTML = `<p style="font-size: 13px; color: #fff;">${rec.title}</p>`;
                    recommendList.appendChild(item);
                });

                const trailerContainer = document.getElementById('trailerContainer');
                trailerContainer.innerHTML = details.trailer_key 
                    ? `<iframe width="100%" height="400" src="https://www.youtube.com/embed/${details.trailer_key}" frameborder="0" allowfullscreen></iframe>`
                    : `<p>예고편이 없습니다.</p>`;

                const reviewList = document.getElementById('reviewList');
                if (details.reviews && details.reviews.length > 0) {
                    reviewList.innerHTML = details.reviews.map(r => `<li><strong>${r.author}</strong>: ${r.content}</li>`).join('');
                } else { reviewList.innerHTML = `<li>작성된 리뷰가 없습니다.</li>`; }

                const voteAverage = details.vote_average || 0; 
                const starRating = Math.round(voteAverage / 2); 
                const stars = '⭐'.repeat(starRating) + '☆'.repeat(5 - starRating);
                document.getElementById('modalRating').innerText = `평점: ${stars} (${voteAverage.toFixed(1)}점)`;

                // 찜 버튼 ON/OFF 스타일링 최적화
                updateLikeButtonUI(movie.id);

                document.getElementById('movieModal').style.display = 'flex';

            } catch (error) { console.error(error); }
        }

        function updateLikeButtonUI(movieId) {
            const likeBtn = document.getElementById('likeBtn');
            if (likedMovieIds.has(movieId)) {
                likeBtn.innerText = "찜 취소 💔";
                likeBtn.style.backgroundColor = "#555";
            } else {
                likeBtn.innerText = "찜하기 ♥";
                likeBtn.style.backgroundColor = "#e50914";
            }
            likeBtn.onclick = () => toggleLikeMovie(movieId);
        }

        // 찜 상태 분기처리 토글 함수
        async function toggleLikeMovie(movieId) {
            const isLiked = likedMovieIds.has(movieId);
            const action = isLiked ? 'unlike' : 'like';

            const response = await fetch(`http://127.0.0.1:8000/api/movies/${action}/${movieId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: userEmail }) 
            });

            if (response.ok) {
                if (isLiked) { likedMovieIds.delete(movieId); } 
                else { likedMovieIds.add(movieId); }
                updateLikeButtonUI(movieId);
                fetchLikedMovies(); // 마이페이지 목록 실시간 갱신
            } else {
                alert("요청 실패");
            }
        }

        fetchLikedMovies();
        fetchPersonalRecommendations(); // 맞춤 추천 목록 불러오기 실행
        
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') document.getElementById('movieModal').style.display = 'none'; });
    </script>
</body>
</html>
