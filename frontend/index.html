<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch - 홈</title>
    <style>
        /* 🎨 화면 디자인 (넷플릭스 스타일 다크 테마) */
        body {
            margin: 0;
            background-color: #141414;
            color: white;
            font-family: 'Pretendard', sans-serif;
        }

        /* 상단 네비게이션 바 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 10%, rgba(0,0,0,0));
        }

        header h1 {
            color: #e50914;
            margin: 0;
            font-size: 32px;
            cursor: pointer;
        }

        /* ✨ 검색창 CSS 추가 */
        .search-container {
            display: flex;
            align-items: center;
            background-color: #222;
            border-radius: 30px;
            padding: 5px 15px;
            margin-right: 20px;
            border: 1px solid #444;
            transition: 0.3s;
        }
        .search-container:focus-within { border-color: #e50914; background-color: #000; }
        .search-input {
            background: transparent; border: none; color: white; padding: 10px; width: 280px; font-size: 15px; outline: none;
        }
        .search-btn {
            background: transparent; border: none; color: #aaa; cursor: pointer; font-size: 16px;
        }
        .search-btn:hover { color: white; }
        .header-right { display: flex; align-items: center; }

        .logout-btn {
            background-color: transparent;
            color: white;
            border: 1px solid white;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .logout-btn:hover {
            background-color: white;
            color: black;
        }

        /* 메인 콘텐츠 영역 */
        .container {
            padding: 0 50px 50px 50px;
        }

        /* 넷플릭스 스타일 가로 스크롤 영역 */
        .category-section {
            margin-bottom: 40px;
        }
        
        .category-title {
            font-size: 22px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .movie-row {
            display: flex;
            overflow-x: auto; /* 가로 스크롤 활성화 */
            gap: 15px;
            padding-bottom: 15px;
        }

        /* 스크롤바 디자인 예쁘게 만들기 */
        .movie-row::-webkit-scrollbar {
            height: 8px;
        }
        .movie-row::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        /* 개별 영화 카드 디자인 */
        .movie-card {
            background-color: #222;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s; 
            cursor: pointer;
            flex: 0 0 auto; /* 카드가 찌그러지지 않게 고정 */
            width: 200px;
        }

        .movie-card:hover {
            transform: scale(1.05); 
            z-index: 2;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }

        .movie-poster {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .movie-info {
            padding: 15px;
        }

        .movie-title {
            margin: 0 0 10px 0;
            font-weight: bold;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; 
        }

        .movie-rating {
            margin: 0;
            color: #ffd700; 
            font-size: 14px;
        }

        /* ✨ [추가] 취향 저격 추천 섹션 강조 디자인 */
        #forYouSection .category-title {
            background: linear-gradient(90deg, #e50914, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 모달 애니메이션 및 구조 */
        @keyframes zoomIn {
            from { transform: scale(0.3); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 100; 
            justify-content: center; 
            align-items: center; 
        }

        .modal-content { 
            background: #181818; 
            width: 80vw;  
            height: 80vh; 
            border-radius: 12px; 
            overflow-y: auto; 
            position: relative;
            animation: zoomIn 0.3s ease-out; 
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .modal-banner { 
            width: 100%; height: 50%; overflow: hidden; position: relative; 
            background-color: #000; 
        }
        .modal-banner img { 
            width: 100%; height: 100%; 
            object-fit: contain;
        }
        .modal-body { padding: 40px; }
        .modal-title { font-size: 40px; margin: 0 0 20px 0; font-weight: bold; }
        .modal-overview { font-size: 18px; line-height: 1.8; color: #d2d2d2; max-width: 800px; }

        .modal-btns { margin-top: 30px; display: flex; gap: 15px; }
        
        #likeBtn { padding: 15px 35px; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s background-color; }
        .close-btn { padding: 15px 35px; background: #333; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 18px; }

        /* 관람등급 뱃지 디자인 */
        .age-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* 추천 영화 호버 효과 추가 */
        .rec-movie {
            transition: transform 0.2s;
        }
        .rec-movie:hover {
            transform: scale(1.05);
        }

        /* 캡처화면 스타일의 보러가기(OTT/극장) 섹션 CSS */
        #watchSectionContainer { margin-top: 25px; margin-bottom: 25px; }
        .watch-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .watch-btn {
            display: flex; align-items: center; justify-content: space-between;
            background-color: #222836; padding: 15px 20px; border-radius: 8px;
            margin-bottom: 10px; cursor: pointer; transition: 0.2s; border: 1px solid #2a3142;
        }
        .watch-btn:hover { background-color: #31384a; }
        .watch-left { display: flex; align-items: center; font-weight: bold; font-size: 15px; }
        .watch-left img { width: 28px; height: 28px; border-radius: 50%; margin-right: 12px; }
        .watch-right { color: #8a93a6; font-size: 14px; display: flex; align-items: center; }
        
        /* 극장 로고를 위한 CSS 아이콘 */
        .theater-icon { 
            width: 28px; height: 28px; border-radius: 50%; margin-right: 12px; 
            display: flex; justify-content: center; align-items: center; font-size: 11px; font-weight: bold; color: white; 
        }
        .cgv { background-color: #ff2a2a; }
        .lotte { background-color: #ed1d24; font-size: 14px; }
        .mega { background-color: #331557; font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <h1 onclick="location.reload()">CineMatch</h1>
        <div class="header-right">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="제목 검색, AI검색은 / 와 함께!" onkeypress="handleEnter(event)">
                <button class="search-btn" onclick="executeSearch()">🔍</button>
            </div>
            
            <span id="userNameDisplay" style="margin-right: 15px; font-weight: bold; color: #aaa;"></span>
            
            <button class="logout-btn" onclick="location.href='mypage.html'" style="margin-right: 10px;">마이페이지</button>
            <button class="logout-btn" onclick="logout()">로그아웃</button>
        </div>
    </header>

    <div class="container">
        <div class="category-section" id="searchResultSection" style="display: none; background-color: #2a1111; padding: 20px; border-radius: 10px; border: 1px solid #e50914;">
            <div class="category-title" id="searchResultTitle" style="color: #e50914;">🔍 검색 결과</div>
            <div class="movie-row" id="searchResultRow"></div>
        </div>

        <!-- ✨ [추가] 회원가입 선호 장르/국가 기반 추천 섹션 (데이터 있을 때만 노출) -->
        <div class="category-section" id="forYouSection" style="display: none;">
            <div class="category-title" id="forYouTitle">✨ 회원님 취향 저격 추천</div>
            <div class="movie-row" id="forYouRow"></div>
        </div>

        <div class="category-section">
            <div class="category-title">🇰🇷 지금 뜨는 국내 영화</div>
            <div class="movie-row" id="koreanRow">
                <p id="loadingText" style="color: gray;">서버에서 영화 데이터를 불러오는 중입니다...</p>
            </div>
        </div>

        <div class="category-section">
            <div class="category-title">🇺🇸 할리우드 인기작</div>
            <div class="movie-row" id="foreignRow"></div>
        </div>

        <div class="category-section">
            <div class="category-title">🦄 놓칠 수 없는 애니메이션</div>
            <div class="movie-row" id="animationRow"></div>
        </div>
    </div>
        
    <div id="movieModal" class="modal">
        <div class="modal-content">
            <div class="modal-banner">
                <img id="modalPoster" src="" alt="포스터">
                <div id="modalAgeRating" class="age-badge" style="display: none;"></div>
            </div>
            
            <div class="modal-body">
                <h2 id="modalTitle"></h2>
                <p id="modalOverview"></p>
                
                <div id="modalDetails" style="margin-bottom: 20px; color: #aaa;">
                    <p id="modalRating"></p>
                    <p id="modalDirector"></p>
                    <p id="modalCast"></p>
                    <p id="modalRelease"></p>
                    <p id="modalGenres"></p>
                    
                    <div id="watchSectionContainer"></div>
                </div>

                <div id="mediaSection" style="margin-top: 30px;">
                    <h3>예고편</h3>
                    <div id="trailerContainer" style="margin-bottom: 20px;"></div>
                    
                    <div id="reviewSection">
                        <h3>사용자 리뷰</h3>
                        <ul id="reviewList" style="list-style: none; padding: 0;"></ul>
                    </div>
                </div>

                <div id="recommendationSection" style="margin-top: 30px; border-top: 1px solid #333; padding-top: 20px;">
                    <h3>이런 영화는 어떠세요?</h3>
                    <div id="recommendList" style="display: flex; gap: 15px; flex-wrap: wrap;"></div>
                </div>
                
                <div class="modal-btns" style="margin-top: 30px;">
                    <button id="likeBtn">찜하기 ♥</button>
                    <button class="close-btn" onclick="document.getElementById('movieModal').style.display='none'">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ✨ [수정] 로그인 체크 (로컬 스토리지 확인)
        const userEmail = localStorage.getItem('userEmail');
        if (!userEmail) {
            alert('로그인이 필요한 서비스입니다.');
            window.location.href = 'login.html';
        }

        const movieMap = new Map(); 
        let likedMovieIds = new Set(); 

        // ✨ [추가] 닉네임 로드 함수
        async function loadUserProfile() {
            try {
                const res = await fetch(`https://cinematch-web-3cut.onrender.com/api/users/profile/${userEmail}`);
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('userNameDisplay').innerHTML = `<span style="color: white;">${data.nickname}</span>님 환영합니다`;
                }
            } catch (e) { 
                console.error('프로필 로드 실패', e); 
            }
        }

        // ✨ [추가] 로그아웃 함수
        function logout() {
            localStorage.removeItem('userEmail'); 
            window.location.href = 'login.html';
        }

        async function syncLikedStatus() {
            try {
                const res = await fetch(`https://cinematch-web-3cut.onrender.com/api/movies/liked-ids/${userEmail}`);
                if (res.ok) {
                    const ids = await res.json();
                    likedMovieIds = new Set(ids);
                }
            } catch (e) { 
                console.error('찜 목록 연동 실패:', e); 
            }
        }

        // ✨ [추가] 카드 한 장을 만들어 주는 공통 함수 (취향 추천 줄에서 재사용)
        function createMovieCard(movie) {
            movieMap.set(movie.id, movie);
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.dataset.id = movie.id;
            card.innerHTML = `
                <img src="${movie.poster_url}" class="movie-poster" alt="${movie.title}">
                <div class="movie-info">
                    <p class="movie-title">${movie.title}</p>
                    <p class="movie-rating">⭐ ${(movie.rating || 0).toFixed(1)}</p>
                </div>
            `;
            return card;
        }

        // ✨ [추가] 회원가입 선호 장르/국가 기반 추천 불러오기
        async function fetchPreferenceRecommendations() {
            try {
                const res = await fetch(`https://cinematch-web-3cut.onrender.com/api/movies/recommendations/preferences/${userEmail}`);
                if (!res.ok) return;
                const data = await res.json();
                if (!data.movies || data.movies.length === 0) return; // 추천 없으면 섹션 숨김 유지

                // 선호 장르를 제목에 반영 (최대 3개)
                if (data.genres && data.genres.length > 0) {
                    document.getElementById('forYouTitle').innerText =
                        `✨ ${data.genres.slice(0, 3).join('·')} 좋아하는 회원님을 위한 추천`;
                }

                const row = document.getElementById('forYouRow');
                row.innerHTML = '';
                data.movies.forEach(movie => row.appendChild(createMovieCard(movie)));

                row.onclick = (e) => {
                    const card = e.target.closest('.movie-card');
                    if (card) {
                        const movieId = parseInt(card.dataset.id);
                        showMovieDetails(movieMap.get(movieId));
                    }
                };

                document.getElementById('forYouSection').style.display = 'block'; // 데이터 있을 때만 노출
            } catch (e) {
                console.error('취향 추천 로드 실패:', e);
            }
        }

        async function fetchAndDisplayMovies() {
            try {
                await syncLikedStatus(); 
                const response = await fetch('https://cinematch-web-3cut.onrender.com/api/movies/home-sections');
                const data = await response.json();

                function renderRow(containerId, movies) {
                    const row = document.getElementById(containerId);
                    row.innerHTML = ''; 

                    movies.forEach(movie => {
                        movieMap.set(movie.id, movie); 
                        
                        const card = document.createElement('div');
                        card.className = 'movie-card';
                        card.dataset.id = movie.id; 
                        card.innerHTML = `
                            <img src="${movie.poster_url}" class="movie-poster" alt="${movie.title}">
                            <div class="movie-info">
                                <p class="movie-title">${movie.title}</p>
                                <p class="movie-rating">⭐ ${movie.rating.toFixed(1)}</p>
                            </div>
                        `;
                        row.appendChild(card);
                    });

                    row.onclick = (e) => {
                        const card = e.target.closest('.movie-card');
                        if (card) {
                            const movieId = parseInt(card.dataset.id);
                            showMovieDetails(movieMap.get(movieId));
                        }
                    };
                }

                renderRow('koreanRow', data.korean);
                renderRow('foreignRow', data.foreign);
                renderRow('animationRow', data.animation);

            } catch (error) {
                console.error('데이터 로드 실패:', error);
                document.getElementById('koreanRow').innerHTML = '<p style="color:red;">데이터를 불러오지 못했습니다. 백엔드 서버가 켜져 있는지 확인해 주세요!</p>';
            }
        }

        async function showMovieDetails(movie) {
            try {
                document.getElementById('movieModal').style.display = 'flex';
                
                if (movie.poster_url) {
                    document.getElementById('modalPoster').src = movie.poster_url;
                }

                const res = await fetch(`https://cinematch-web-3cut.onrender.com/api/movies/details/${movie.id}`);
                const details = await res.json();

                document.getElementById('modalTitle').innerText = details.title || movie.title;
                document.getElementById('modalOverview').innerText = `줄거리 : ${details.overview || '정보 없음'}`;
                document.getElementById('modalDirector').innerText = `감독: ${details.director}`;
                document.getElementById('modalCast').innerText = `출연: ${details.cast}`;
                document.getElementById('modalRelease').innerText = `개봉일: ${details.release_date}`;
                document.getElementById('modalGenres').innerText = `장르: ${details.genres.join(", ")}`;
                
                const ageBadge = document.getElementById('modalAgeRating');
                if (details.age_rating && details.age_rating !== "등급 미정") {
                    ageBadge.innerText = details.age_rating;
                    ageBadge.style.display = 'block';
                    ageBadge.style.backgroundColor = details.age_rating === '청소년관람불가' ? '#e50914' : 'rgba(51, 51, 51, 0.9)';
                } else {
                    ageBadge.style.display = 'none'; 
                }

                const watchSection = document.getElementById('watchSectionContainer');
                let watchHtml = '<h3 class="watch-title">보러가기</h3>';

                if (details.is_playing_in_theater) {
                    watchHtml += `
                        <div class="watch-btn" onclick="window.open('http://www.cgv.co.kr/search/?query=${encodeURIComponent(details.title)}', '_blank')">
                            <div class="watch-left"><div class="theater-icon cgv">CGV</div> CGV</div>
                            <div class="watch-right">예매하기 〉</div>
                        </div>
                        <div class="watch-btn" onclick="window.open('https://www.lottecinema.co.kr/NLCHS/Home', '_blank')">
                            <div class="watch-left"><div class="theater-icon lotte">L</div> 롯데시네마</div>
                            <div class="watch-right">예매하기 〉</div>
                        </div>
                        <div class="watch-btn" onclick="window.open('https://www.megabox.co.kr/', '_blank')">
                            <div class="watch-left"><div class="theater-icon mega">M</div> 메가박스</div>
                            <div class="watch-right">예매하기 〉</div>
                        </div>
                    `;
                } else if (details.ott_providers && details.ott_providers.length > 0) {
                    details.ott_providers.forEach(p => {
                        watchHtml += `
                            <div class="watch-btn">
                                <div class="watch-left">
                                    <img src="https://image.tmdb.org/t/p/w200${p.logo_path}" alt="${p.provider_name}">
                                    ${p.provider_name}
                                </div>
                                <div class="watch-right">정액제 〉</div>
                            </div>
                        `;
                    });
                } else {
                    watchHtml += `<div class="watch-btn"><div class="watch-left" style="color: gray; font-weight: normal;">현재 시청 가능한 스트리밍 서비스나 상영관이 없습니다.</div></div>`;
                }
                
                watchSection.innerHTML = watchHtml;

                const recommendList = document.getElementById('recommendList');
                recommendList.innerHTML = '';
                if (details.recommendations && details.recommendations.length > 0) {
                    details.recommendations.forEach(rec => {
                        if(rec.poster_url) {
                            const item = document.createElement('div');
                            item.className = 'rec-movie';
                            item.style.textAlign = 'center';
                            item.style.width = '120px';
                            item.style.cursor = 'pointer';
                            item.innerHTML = `
                                <img src="${rec.poster_url}" style="width: 100%; border-radius: 8px;">
                                <p style="font-size: 13px; color: #fff; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${rec.title}</p>
                            `;
                            
                            item.onclick = () => {
                                document.querySelector('.modal-content').scrollTop = 0;
                                showMovieDetails({ id: rec.id, poster_url: rec.poster_url, title: rec.title });
                            };
                            
                            recommendList.appendChild(item);
                        }
                    });
                } else {
                    recommendList.innerHTML = '<p style="color:gray;">추천 영화가 없습니다.</p>';
                }

                const trailerContainer = document.getElementById('trailerContainer');
                trailerContainer.innerHTML = details.trailer_key 
                    ? `<iframe width="100%" height="400" src="https://www.youtube.com/embed/${details.trailer_key}" frameborder="0" allowfullscreen></iframe>`
                    : `<p>예고편이 없습니다.</p>`;

                const reviewList = document.getElementById('reviewList');
                if (details.reviews && details.reviews.length > 0) {
                    reviewList.innerHTML = details.reviews.map(r => 
                        `<li><strong>${r.author}</strong>: ${r.content}</li>`
                    ).join('');
                } else {
                    reviewList.innerHTML = `<li>작성된 리뷰가 없습니다.</li>`;
                }

                const voteAverage = details.vote_average || 0; 
                const starRating = Math.round(voteAverage / 2); 
                const stars = '⭐'.repeat(starRating) + '☆'.repeat(5 - starRating);
                document.getElementById('modalRating').innerText = `평점: ${stars} (${voteAverage.toFixed(1)}점)`;

                updateLikeButtonUI(movie.id);

            } catch (error) {
                console.error("오류 발생:", error);
                alert("정보를 불러오는 중 오류가 발생했습니다.");
            }
        }

        function updateLikeButtonUI(movieId) {
            const likeBtn = document.getElementById('likeBtn');
            if (likedMovieIds.has(movieId)) {
                likeBtn.innerText = "찜 취소 💔";
                likeBtn.style.backgroundColor = "#555"; 
            } else {
                likeBtn.innerText = "찜하기 ♥";
                likeBtn.style.backgroundColor = "#e50914"; 
            }
            likeBtn.onclick = () => toggleLikeMovie(movieId);
        }

        async function toggleLikeMovie(movieId) {
            const isLiked = likedMovieIds.has(movieId);
            const action = isLiked ? 'unlike' : 'like'; 

            try {
                const response = await fetch(`https://cinematch-web-3cut.onrender.com/api/movies/${action}/${movieId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail }) 
                });

                if (response.ok) {
                    if (isLiked) {
                        likedMovieIds.delete(movieId);
                    } else {
                        likedMovieIds.add(movieId);
                    }
                    updateLikeButtonUI(movieId); 
                } else {
                    alert("요청 처리 중 문제가 발생했습니다.");
                }
            } catch (error) {
                console.error(error);
                alert("서버와 통신할 수 없습니다.");
            }
        }

        // 엔터키 입력 감지 함수
        function handleEnter(event) {
            if (event.key === 'Enter') executeSearch();
        }

        // 검색 라우팅 핵심 로직
        async function executeSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            const searchSection = document.getElementById('searchResultSection');
            const searchRow = document.getElementById('searchResultRow');
            const searchTitle = document.getElementById('searchResultTitle');
            
            searchRow.innerHTML = '<p style="color: gray;">검색 중입니다. 잠시만 기다려주세요...</p>';
            searchSection.style.display = 'block'; 
            window.scrollTo({ top: 0, behavior: 'smooth' }); 

            let apiUrl = '';
            
            if (query.startsWith('/')) {
                const exactQuery = query.substring(1).trim(); 
                apiUrl = `https://cinematch-web-3cut.onrender.com/api/movies/search/ai?query=${encodeURIComponent(exactQuery)}`;
                searchTitle.innerHTML = `🤖 AI 추천 결과 : "<span style="color:white;">${exactQuery}</span>"`;
            } else {
                apiUrl = `https://cinematch-web-3cut.onrender.com/api/movies/search/title?query=${encodeURIComponent(query)}`;
                searchTitle.innerHTML = `🔍 일반 검색 결과 : "<span style="color:white;">${query}</span>"`;
            }

            try {
                const response = await fetch(apiUrl);
                const movies = await response.json();
                searchRow.innerHTML = ''; 

                if (movies.length === 0) {
                    searchRow.innerHTML = '<p style="color: gray;">조건에 맞는 영화를 찾지 못했습니다.</p>';
                    return;
                }

                movies.forEach(movie => {
                    movieMap.set(movie.id, movie); 
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.dataset.id = movie.id; 
                    card.innerHTML = `
                        <img src="${movie.poster_url}" class="movie-poster" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/200x300?text=No+Image'">
                        <div class="movie-info">
                            <p class="movie-title">${movie.title}</p>
                            <p class="movie-rating">⭐ ${movie.rating.toFixed(1)}</p>
                        </div>
                    `;
                    searchRow.appendChild(card);
                });

                searchRow.onclick = (e) => {
                    const card = e.target.closest('.movie-card');
                    if (card) {
                        const movieId = parseInt(card.dataset.id);
                        showMovieDetails(movieMap.get(movieId));
                    }
                };

            } catch (error) {
                console.error('검색 실패:', error);
                searchRow.innerHTML = '<p style="color:red;">검색 중 오류가 발생했습니다.</p>';
            }
        }

        // ✨ 함수 실행! (순서 주의: 유저 프로필 먼저 불러오기)
        loadUserProfile(); 
        fetchAndDisplayMovies();
        fetchPreferenceRecommendations();   // ✨ [추가] 취향 기반 추천 불러오기

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('movieModal').style.display = 'none';
            }
        });
    </script>
</body>
</html>
